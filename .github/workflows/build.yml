name: Build check
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            client/voxply-desktop/package-lock.json
            client/voxply-web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo check
        run: cargo check --workspace
      - name: Install npm deps
        working-directory: client/voxply-desktop
        run: npm ci
      - name: TypeScript check (desktop)
        working-directory: client/voxply-desktop
        run: npx tsc --noEmit
      - name: Install npm deps (web)
        working-directory: client/voxply-web
        run: npm ci
      - name: TypeScript check (web)
        working-directory: client/voxply-web
        run: npx tsc --noEmit
