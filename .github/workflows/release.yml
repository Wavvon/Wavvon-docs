name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/voxply-desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked
      - name: Install npm deps
        working-directory: client/voxply-desktop
        run: npm ci
      - name: Build
        working-directory: client/voxply-desktop
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voxply-${{ matrix.os }}-${{ github.ref_name }}
          path: |
            client/voxply-desktop/src-tauri/target/release/bundle/**/*.exe
            client/voxply-desktop/src-tauri/target/release/bundle/**/*.msi
            client/voxply-desktop/src-tauri/target/release/bundle/**/*.AppImage
            client/voxply-desktop/src-tauri/target/release/bundle/**/*.deb
