openapi: 3.0.3
info:
  title: Wavvon Hub API
  version: "1.0"
  description: |
    REST + WebSocket API for a Wavvon hub server. This file is the
    protocol contract — implement a client in any language against
    this spec without reading Rust source.

    ## Authentication

    All endpoints (except `/health`, `/info`, `/auth/*`, `/join/:code`)
    require a Bearer token obtained from `POST /auth/verify`.

    ### Auth flow

    1. `POST /auth/challenge` with your hex-encoded Ed25519 public key.
    2. Sign the returned `challenge` string with your Ed25519 private key.
       - Sign the raw UTF-8 bytes of the challenge string (no prefix, no digest).
       - Encode the 64-byte signature as lowercase hex.
    3. `POST /auth/verify` with your public key, the challenge, and the hex signature.
       - Optionally include a `security_nonce` + `security_level` for PoW (see below).
    4. On success, receive a `token`. Send it as `Authorization: Bearer <token>` on all
       subsequent requests.

    ### Proof-of-Work (PoW)

    Some hubs require callers to prove a security level before granting membership.
    The algorithm:

    ```
    hash = SHA256(utf8(public_key_hex) || little_endian_u64(nonce))
    level = number of leading zero BITS in hash
    ```

    To reach level N, iterate nonces starting from 1 until a hash with ≥ N leading
    zero bits is found. Level 0 = no work required. Level 20 takes ~1M hashes on average.

    Submit `security_nonce` (the winning nonce as a u64) and `security_level` (the
    claimed level) in `POST /auth/verify`. The hub verifies independently.

    ### Session scope

    `POST /auth/verify` returns a `scope` field:
    - `"member"` — full access.
    - `"lobby"` — hub has a security lobby and your PoW level is below the minimum.
      You can only call `/lobby/*` endpoints until promoted.

    ## Bot authentication

    Bot API endpoints (`/bot/*`) use `Authorization: Bearer <bot_token>` where the
    token is the raw token returned at bot creation time (not a session token).

    ## WebSocket protocol

    All realtime traffic (chat events, typing, DMs, voice presence, proximity
    voice zones, video and screen-share WebRTC signaling, screen-share chunk
    relay, forum/poll/pin events, and bot event push) runs
    over a single WebSocket at `GET /ws`.

    - **Connect:** `GET /ws?token=<token>` — the token goes in the **`token`
      query parameter**, not a header. Both session tokens (from
      `POST /auth/verify`) and bot tokens are accepted, with the same expiry /
      revocation / approval / ban checks as REST.
    - **Framing:** every protocol message is a JSON text frame with a `type`
      discriminator and the payload fields at the same level
      (e.g. `{"type":"subscribe","channel_id":"..."}`). Binary frames are used
      only for screen-share chunk data and are always preceded by a
      `screen_share_chunk` JSON envelope.
    - **On connect** the hub sends `{"type":"hello","live_seq":<n>}`,
      auto-subscribes the connection to every non-banned channel, and replays
      `screen_share_started` for shares already in progress.
    - Unknown or malformed client frames are silently ignored; recoverable
      command failures come back as `{"type":"error","context":...,"message":...}`.

    OpenAPI 3.0 cannot model WebSocket messages natively, so the **complete
    message-by-message wire reference** (34 client→server messages, 49
    server→client messages plus 6 raw/bot push messages, with exact field names
    and types) lives in [`docs/ws-protocol.md`](docs/ws-protocol.md). That file
    is part of this protocol contract: implement the WS side against it.

servers:
  - url: http://localhost:3000
    description: Local development hub

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    User:
      type: object
      properties:
        public_key: { type: string }
        display_name: { type: string, nullable: true }
        avatar: { type: string, nullable: true, description: "Base64-encoded image" }
        online: { type: boolean }
        group_role: { type: string, nullable: true }
        is_bot: { type: boolean }

    Channel:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        created_by: { type: string }
        parent_id: { type: string, nullable: true }
        is_category: { type: boolean }
        display_order: { type: integer }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        color: { type: string, nullable: true }
        custom_icon_svg: { type: string, nullable: true }
        created_at: { type: integer, description: "Unix timestamp" }

    Message:
      type: object
      properties:
        id: { type: string }
        channel_id: { type: string }
        sender: { type: string }
        sender_name: { type: string, nullable: true }
        content: { type: string }
        created_at: { type: integer }
        edited_at: { type: integer, nullable: true }
        attachments:
          type: array
          items: { $ref: '#/components/schemas/Attachment' }
        reactions:
          type: array
          items: { $ref: '#/components/schemas/Reaction' }
        reply_to: { $ref: '#/components/schemas/ReplyContext', nullable: true }
        visible_to_pubkey:
          type: string
          description: >-
            Omitted unless set. When present, only the named user should see
            this message (ephemeral bot replies).
        reply_count:
          type: integer
          description: Number of direct replies; non-zero only on thread roots.

    Attachment:
      type: object
      properties:
        name: { type: string }
        mime: { type: string }
        data_b64: { type: string }

    Reaction:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        me: { type: boolean }

    ReplyContext:
      type: object
      properties:
        message_id: { type: string }
        sender: { type: string }
        sender_name: { type: string, nullable: true }
        content_preview: { type: string }

    Role:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        permissions: { type: array, items: { type: string } }
        priority: { type: integer }
        display_separately: { type: boolean }

    Invite:
      type: object
      properties:
        code: { type: string }
        created_by: { type: string }
        max_uses: { type: integer, nullable: true }
        uses: { type: integer }
        expires_at: { type: integer, nullable: true }
        created_at: { type: integer }

    HubInfo:
      type: object
      properties:
        hub_name: { type: string }
        hub_url: { type: string }
        hub_icon: { type: string, nullable: true }
        require_invite: { type: boolean }
        min_security_level: { type: integer }
        challenge_mode: { type: string, enum: [off, click, puzzle, both] }

    MeInfo:
      type: object
      properties:
        public_key: { type: string }
        display_name: { type: string, nullable: true }
        avatar: { type: string, nullable: true }
        approval_status: { type: string, enum: [approved, pending] }
        roles:
          type: array
          items: { $ref: '#/components/schemas/Role' }

    DmMessage:
      type: object
      properties:
        id: { type: string }
        conversation_id: { type: string }
        sender: { type: string }
        sender_name: { type: string, nullable: true }
        content: { type: string }
        created_at: { type: integer }
        attachments:
          type: array
          items: { $ref: '#/components/schemas/Attachment' }
        is_encrypted: { type: boolean }
        delivery_failed: { type: boolean }

    Conversation:
      type: object
      properties:
        id: { type: string }
        conv_type: { type: string }
        members: { type: array, items: { type: string } }
        created_at: { type: integer }
        last_activity_at: { type: integer }

    BotAdminInfo:
      type: object
      properties:
        public_key: { type: string }
        display_name: { type: string }
        created_by: { type: string }
        created_at: { type: integer }
        webhook_url: { type: string, nullable: true }

    BotDetail:
      allOf:
        - $ref: '#/components/schemas/BotAdminInfo'
        - type: object
          properties:
            commands:
              type: array
              items:
                type: object
                properties:
                  command: { type: string }
                  description: { type: string }

    LobbyStatus:
      type: object
      properties:
        status: { type: string, enum: [lobby, promoted, member] }
        required_level: { type: integer }
        current_level: { type: integer }
        entered_at: { type: integer, nullable: true }
        welcome_md: { type: string, nullable: true }

    ChallengePrompt:
      type: object
      properties:
        id: { type: string }
        mode: { type: string, enum: [click, puzzle, both] }
        prompt_svg: { type: string, nullable: true, description: "SVG puzzle image, present when mode includes puzzle" }
        expires_at: { type: integer }

    AllianceInfo:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        created_by: { type: string }
        created_at: { type: integer }

    BadgePayload:
      type: object
      description: Canonical badge payload signed by the issuing hub.
      properties:
        issuer_pubkey: { type: string }
        issuer_url: { type: string }
        subject_pubkey: { type: string }
        label: { type: string }
        issued_at: { type: string, description: "ISO-8601 timestamp" }
        expires_at: { type: string, nullable: true }

    CertPayload:
      type: object
      description: Canonical certification payload signed by the issuing hub.
      properties:
        subject_kind: { type: string, description: "Always 'user'" }
        issuer_pubkey: { type: string }
        issuer_url: { type: string }
        subject_pubkey: { type: string }
        member_since: { type: integer }
        standing: { type: string, enum: [good, revoked] }
        pow_level: { type: integer, nullable: true }
        issued_at: { type: integer }
        expires_at: { type: integer }
        capabilities: { type: array, items: { type: string } }

    Certification:
      type: object
      description: Certification envelope (payload + hex Ed25519 hub signature).
      properties:
        payload: { $ref: '#/components/schemas/CertPayload' }
        signature: { type: string }

    PostSummary:
      type: object
      properties:
        id: { type: string }
        channel_id: { type: string }
        author_pubkey: { type: string, nullable: true, description: "Null on tombstoned posts for non-moderators" }
        title: { type: string, nullable: true }
        created_at: { type: integer }
        edited_at: { type: integer, description: "Omitted when never edited" }
        is_pinned: { type: boolean }
        is_locked: { type: boolean }
        reply_count: { type: integer }
        last_activity_at: { type: integer }
        is_deleted: { type: boolean }
        unread_reply_count:
          type: integer
          description: Replies after the viewer's read cursor. Omitted when unauthenticated.

    PostDetail:
      allOf:
        - $ref: '#/components/schemas/PostSummary'
        - type: object
          properties:
            body: { type: string, nullable: true }
            replies:
              type: array
              items: { $ref: '#/components/schemas/ReplyView' }
            reply_cursor: { type: string, description: "Omitted when there are no more replies" }

    ReplyView:
      type: object
      properties:
        id: { type: string }
        post_id: { type: string }
        author_pubkey: { type: string, nullable: true }
        body: { type: string, nullable: true, description: "Null on tombstoned replies" }
        created_at: { type: integer }
        edited_at: { type: integer, description: "Omitted when never edited" }
        reply_to_id: { type: string, description: "Omitted on top-level replies" }
        is_deleted: { type: boolean }

    Error:
      type: object
      properties:
        error: { type: string }

paths:

  # ── WebSocket ─────────────────────────────────────────────────────────────

  /ws:
    get:
      summary: Realtime WebSocket endpoint
      description: |
        Upgrades to a WebSocket carrying all realtime traffic. Authenticate
        with the `token` query parameter (session token or bot token); the
        upgrade is rejected with `401`/`403` on invalid, expired, or banned
        credentials.

        The full message catalogue — every client→server and server→client
        JSON message with exact field names and types — is documented in
        [`docs/ws-protocol.md`](docs/ws-protocol.md) (see also the
        "WebSocket protocol" section of this file's description).
      security: []
      tags: [WebSocket]
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: Session token from `POST /auth/verify`, or a bot token.
      responses:
        "101":
          description: Switching Protocols — WebSocket established.
        "401":
          description: Invalid or expired token.

  # ── Health ────────────────────────────────────────────────────────────────

  /health:
    get:
      summary: Liveness check
      security: []
      tags: [Health]
      responses:
        "200":
          description: Hub is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /info:
    get:
      summary: Hub metadata
      description: Returns public hub information. No auth required — used by clients before joining.
      security: []
      tags: [Health]
      responses:
        "200":
          description: Hub info
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HubInfo' }

  # ── Auth ──────────────────────────────────────────────────────────────────

  /auth/challenge:
    post:
      summary: Request an auth challenge
      description: |
        Returns a random nonce string. The client must sign this with its
        Ed25519 private key and submit it to `POST /auth/verify`.
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key]
              properties:
                public_key:
                  type: string
                  description: Hex-encoded Ed25519 public key (64 hex chars)
      responses:
        "200":
          description: Challenge issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge: { type: string, description: "Random nonce string to sign" }

  /auth/verify:
    post:
      summary: Verify signature and obtain session token
      description: |
        Submit the signed challenge to receive a Bearer token.

        **Signing:** sign the raw UTF-8 bytes of the `challenge` string with your
        Ed25519 private key. Encode the 64-byte signature as lowercase hex.

        **PoW:** if the hub requires a security level > 0, compute:
        `SHA256(utf8(public_key_hex) || little_endian_u64(nonce))` and find a
        `nonce` (u64, starting from 1) whose hash has ≥ N leading zero bits.
        Submit that nonce as `security_nonce` and N as `security_level`.
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key, challenge, signature]
              properties:
                public_key: { type: string }
                challenge: { type: string }
                signature: { type: string, description: "Hex-encoded Ed25519 signature over the challenge bytes" }
                invite_code: { type: string, description: "Required for invite-only hubs" }
                security_nonce: { type: integer, format: int64, description: "PoW nonce" }
                security_level: { type: integer, description: "Claimed PoW level" }
                subkey_cert:
                  type: object
                  description: "Multi-device: links a device subkey to a master key"
                challenge_token:
                  type: string
                  description: "Token from POST /challenge/verify (required when challenge_mode != off)"
      responses:
        "200":
          description: Auth successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  scope:
                    type: string
                    enum: [member, lobby]
                    description: "'lobby' means the user must complete PoW in /lobby before full access"
        "401":
          description: Invalid signature or banned

  # ── Me ────────────────────────────────────────────────────────────────────

  /me:
    get:
      summary: Get own profile and roles
      tags: [Me]
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeInfo' }
    patch:
      summary: Update display name and avatar
      tags: [Me]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: { type: string }
                avatar: { type: string, nullable: true }

  # ── Hub ───────────────────────────────────────────────────────────────────

  /hub:
    patch:
      summary: Update hub name / icon (admin)
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hub_name: { type: string }
                hub_icon: { type: string, nullable: true }

  /hub/settings:
    get:
      summary: Get hub settings (admin)
      tags: [Hub]
      responses:
        "200":
          description: Hub settings object

  /hub/members:
    get:
      summary: List all hub members including bots
      tags: [Hub]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }

  /hub/pending:
    get:
      summary: List users awaiting approval (admin)
      tags: [Hub]

  /hub/pending/{target_key}/approve:
    post:
      summary: Approve a pending user (admin)
      tags: [Hub]
      parameters:
        - name: target_key
          in: path
          required: true
          schema: { type: string }

  /hub/icons:
    get:
      summary: List custom hub icons
      tags: [Hub]
    post:
      summary: Upload a custom SVG icon (admin)
      tags: [Hub]

  /hub/icons/{icon_id}:
    patch:
      summary: Rename a hub icon (admin)
      tags: [Hub]
      parameters:
        - name: icon_id
          in: path
          required: true
          schema: { type: string }
    delete:
      summary: Delete a hub icon (admin)
      tags: [Hub]
      parameters:
        - name: icon_id
          in: path
          required: true
          schema: { type: string }

  /hub/settings/lobby:
    put:
      summary: Update lobby / security level settings (admin)
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                min_security_level: { type: integer }
                welcome_md: { type: string, nullable: true }

  /hub/settings/challenge:
    put:
      summary: Update bot-challenge mode (admin)
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                challenge_mode: { type: string, enum: [off, click, puzzle, both] }

  # ── Channels ──────────────────────────────────────────────────────────────

  /channels:
    get:
      summary: List all channels and categories
      tags: [Channels]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Channel' }
    post:
      summary: Create a channel or category (manage_channels)
      tags: [Channels]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                is_category: { type: boolean }
                parent_id: { type: string, nullable: true }
                description: { type: string }

  /channels/reorder:
    post:
      summary: Reorder channels (manage_channels)
      tags: [Channels]

  /channels/{channel_id}:
    patch:
      summary: Update channel (manage_channels)
      tags: [Channels]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
    delete:
      summary: Delete channel (manage_channels)
      tags: [Channels]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/members:
    get:
      summary: List members currently in a voice channel
      tags: [Channels]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }

  /voice/populations:
    get:
      summary: Voice user count per channel
      tags: [Voice]

  /voice/active-users:
    get:
      summary: List all users in any voice channel
      tags: [Voice]

  /voice/participants:
    get:
      summary: Participants in the caller's current voice channel
      tags: [Voice]

  /voice/ws:
    get:
      summary: Voice WebSocket endpoint
      description: |
        Upgrades to a WebSocket for real-time audio relay. Authenticate with
        the `token` query parameter (same session token used for `/ws`); the
        upgrade is rejected silently on invalid or expired credentials.

        On successful upgrade the server sends a `voice_ws_ready` JSON text
        frame containing the assigned `sender_id` (u16) and the current
        `participants` list.  After that, the client sends binary audio
        frames (`[seq:u16][ts:u32][opus…]`) and receives fan-out frames
        (`[sender_id:u16][type:u8][opus…]`) from other participants.
        The connection also carries UDP-sourced audio for peers that joined
        via the UDP voice path.

        Closing the WebSocket triggers the same leave-voice teardown as the
        UDP flow.
      security: []
      tags: [Voice, WebSocket]
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: Session token from `POST /auth/verify`.
        - name: channel_id
          in: query
          required: true
          schema: { type: string }
          description: ID of the voice channel to join.
      responses:
        "101":
          description: Switching Protocols — voice WebSocket established.
        "401":
          description: Invalid or expired token (connection closed immediately).

  # ── Messages ──────────────────────────────────────────────────────────────

  /channels/{channel_id}/messages:
    get:
      summary: Fetch message history
      tags: [Messages]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: before
          in: query
          schema: { type: string }
          description: Message ID cursor for pagination
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Message' }
    post:
      summary: Send a message
      tags: [Messages]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
                attachments:
                  type: array
                  items: { $ref: '#/components/schemas/Attachment' }
                reply_to: { type: string, description: "Message ID being replied to" }

  /channels/{channel_id}/messages/{message_id}:
    patch:
      summary: Edit own message
      tags: [Messages]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: message_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content: { type: string }
    delete:
      summary: Delete message (own or manage_messages)
      tags: [Messages]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: message_id
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/messages/{message_id}/reactions:
    post:
      summary: Add reaction to a message
      tags: [Messages]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: message_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji: { type: string }

  /channels/{channel_id}/messages/{message_id}/reactions/{emoji}:
    delete:
      summary: Remove own reaction
      tags: [Messages]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: message_id
          in: path
          required: true
          schema: { type: string }
        - name: emoji
          in: path
          required: true
          schema: { type: string }

  # ── Direct Messages ───────────────────────────────────────────────────────

  /conversations:
    get:
      summary: List DM conversations
      tags: [DMs]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Conversation' }
    post:
      summary: Create a DM conversation
      tags: [DMs]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [members]
              properties:
                members:
                  type: array
                  items: { type: string }

  /conversations/{conversation_id}/messages:
    get:
      summary: List messages in a DM conversation
      tags: [DMs]
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DmMessage' }
    post:
      summary: Send a DM
      tags: [DMs]
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
                attachments:
                  type: array
                  items: { $ref: '#/components/schemas/Attachment' }
                is_encrypted: { type: boolean }

  # ── Friends ───────────────────────────────────────────────────────────────

  /friends:
    get:
      summary: List accepted friends
      tags: [Friends]
    post:
      summary: Send a friend request
      tags: [Friends]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [public_key]
              properties:
                public_key: { type: string }
                hub_url: { type: string, description: "Required for federated (cross-hub) friends" }

  /friends/pending:
    get:
      summary: List incoming pending friend requests
      tags: [Friends]

  /friends/{public_key}/accept:
    post:
      summary: Accept a friend request
      tags: [Friends]
      parameters:
        - name: public_key
          in: path
          required: true
          schema: { type: string }

  /friends/{public_key}:
    delete:
      summary: Remove a friend
      tags: [Friends]
      parameters:
        - name: public_key
          in: path
          required: true
          schema: { type: string }

  # ── Invites ───────────────────────────────────────────────────────────────

  /invites:
    get:
      summary: List active invites (manage_invites)
      tags: [Invites]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Invite' }
    post:
      summary: Create an invite (manage_invites)
      tags: [Invites]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                max_uses: { type: integer, nullable: true }
                expires_at: { type: integer, nullable: true }

  /invites/{code}:
    delete:
      summary: Revoke an invite (manage_invites)
      tags: [Invites]
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }

  # ── Roles ─────────────────────────────────────────────────────────────────

  /roles:
    get:
      summary: List roles
      tags: [Roles]
    post:
      summary: Create a role (manage_roles)
      tags: [Roles]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                permissions: { type: array, items: { type: string } }
                priority: { type: integer }
                display_separately: { type: boolean }

  /roles/{role_id}:
    patch:
      summary: Update a role (manage_roles)
      tags: [Roles]
      parameters:
        - name: role_id
          in: path
          required: true
          schema: { type: string }
    delete:
      summary: Delete a role (manage_roles)
      tags: [Roles]
      parameters:
        - name: role_id
          in: path
          required: true
          schema: { type: string }

  /roles/{role_id}/members:
    get:
      summary: List members with this role
      tags: [Roles]
      parameters:
        - name: role_id
          in: path
          required: true
          schema: { type: string }

  /users/{public_key}/roles:
    get:
      summary: Get roles assigned to a user
      tags: [Roles]
      parameters:
        - name: public_key
          in: path
          required: true
          schema: { type: string }

  /users/{public_key}/roles/{role_id}:
    put:
      summary: Assign role to user (manage_roles)
      tags: [Roles]
      parameters:
        - name: public_key
          in: path
          required: true
          schema: { type: string }
        - name: role_id
          in: path
          required: true
          schema: { type: string }
    delete:
      summary: Remove role from user (manage_roles)
      tags: [Roles]
      parameters:
        - name: public_key
          in: path
          required: true
          schema: { type: string }
        - name: role_id
          in: path
          required: true
          schema: { type: string }

  # ── Moderation ────────────────────────────────────────────────────────────

  /moderation/bans:
    get:
      summary: List bans (manage_users)
      tags: [Moderation]
    post:
      summary: Ban a user (manage_users)
      tags: [Moderation]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [target_public_key]
              properties:
                target_public_key: { type: string }
                reason: { type: string }

  /moderation/bans/{target_key}:
    delete:
      summary: Unban (manage_users)
      tags: [Moderation]
      parameters:
        - name: target_key
          in: path
          required: true
          schema: { type: string }

  /moderation/mutes:
    get:
      summary: List mutes (manage_users)
      tags: [Moderation]
    post:
      summary: Mute a user (manage_users)
      tags: [Moderation]

  /moderation/mutes/{target_key}:
    delete:
      summary: Unmute (manage_users)
      tags: [Moderation]
      parameters:
        - name: target_key
          in: path
          required: true
          schema: { type: string }

  /moderation/timeout:
    post:
      summary: Timeout a user (manage_users)
      tags: [Moderation]

  /moderation/kick:
    post:
      summary: Kick a user (manage_users)
      tags: [Moderation]

  /moderation/channels/{channel_id}/bans:
    get:
      summary: List per-channel bans
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
    post:
      summary: Ban user from a channel (manage_channels)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }

  /moderation/channels/{channel_id}/bans/{target_key}:
    delete:
      summary: Remove channel ban (manage_channels)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: target_key
          in: path
          required: true
          schema: { type: string }

  /moderation/voice-mutes:
    get:
      summary: List voice mutes
      tags: [Moderation]
    post:
      summary: Voice-mute a user (manage_users)
      tags: [Moderation]

  /moderation/voice-mutes/{target_key}:
    delete:
      summary: Remove voice mute
      tags: [Moderation]
      parameters:
        - name: target_key
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/talk-power:
    get:
      summary: Get talk-power setting for channel
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
    post:
      summary: Set talk-power (manage_channels)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }

  # ── Users ─────────────────────────────────────────────────────────────────

  /users:
    get:
      summary: List all users
      tags: [Users]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }

  # ── Alliances ─────────────────────────────────────────────────────────────

  /alliances:
    get:
      summary: List alliances this hub belongs to
      tags: [Alliances]
    post:
      summary: Create an alliance (manage_hub)
      tags: [Alliances]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }

  /alliances/join:
    post:
      summary: Join an alliance via invite token (manage_hub)
      tags: [Alliances]

  /alliances/pending-invites:
    get:
      summary: List pending alliance invites received by this hub
      tags: [Alliances]

  /alliances/pending-invites/{invite_id}/accept:
    post:
      summary: Accept a pending alliance invite (manage_hub)
      tags: [Alliances]
      parameters:
        - name: invite_id
          in: path
          required: true
          schema: { type: string }

  /alliances/pending-invites/{invite_id}:
    delete:
      summary: Decline a pending alliance invite
      tags: [Alliances]
      parameters:
        - name: invite_id
          in: path
          required: true
          schema: { type: string }

  /alliances/{alliance_id}:
    get:
      summary: Get alliance details and member hubs
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }

  /alliances/{alliance_id}/invite:
    post:
      summary: Create an invite token for another hub to join (manage_hub)
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }

  /alliances/{alliance_id}/leave:
    delete:
      summary: Leave an alliance (manage_hub)
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }

  /alliances/{alliance_id}/channels:
    get:
      summary: List channels shared into this alliance
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }
    post:
      summary: Share a channel into the alliance (manage_channels)
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }

  /alliances/{alliance_id}/channels/{channel_id}:
    delete:
      summary: Unshare a channel from the alliance
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }
        - name: channel_id
          in: path
          required: true
          schema: { type: string }

  /alliances/{alliance_id}/channels/{channel_id}/messages:
    get:
      summary: Fetch federated channel messages
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
    post:
      summary: Post to a federated alliance channel
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }
        - name: channel_id
          in: path
          required: true
          schema: { type: string }

  # ── Lobby ─────────────────────────────────────────────────────────────────

  /lobby/status:
    get:
      summary: Get lobby status for the current user
      description: Available when session scope is "lobby". Returns PoW progress.
      tags: [Lobby]
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LobbyStatus' }

  /lobby/submit-pow:
    post:
      summary: Submit a PoW nonce to increase security level
      description: |
        Compute `SHA256(utf8(public_key_hex) || little_endian_u64(nonce))` and
        find a nonce whose hash has ≥ N leading zero bits, then submit here.
        On promotion, the session scope changes to "member".
      tags: [Lobby]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [nonce, claimed_level]
              properties:
                nonce: { type: integer, format: int64 }
                claimed_level: { type: integer }

  /lobby/welcome:
    get:
      summary: Get the hub's welcome message (Markdown)
      tags: [Lobby]

  # ── Bot Challenge ─────────────────────────────────────────────────────────

  /challenge/new:
    get:
      summary: Fetch a bot-challenge prompt
      description: |
        Returns a challenge the user must solve before auth. Mode is set by the hub admin.
        - `click`: no SVG, user just confirms they are human.
        - `puzzle`: SVG math puzzle, user types the answer.
        - `both`: SVG puzzle shown, click confirmation also required.
      security: []
      tags: [Challenge]
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChallengePrompt' }

  /challenge/verify:
    post:
      summary: Submit challenge answer and receive a one-time token
      description: |
        On success returns a `challenge_token` to include in `POST /auth/verify`.
      security: []
      tags: [Challenge]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id]
              properties:
                challenge_id: { type: string }
                answer: { type: string, description: "Numeric answer for puzzle mode; omit for click-only" }

  # ── Survey ────────────────────────────────────────────────────────────────

  /survey/current:
    get:
      summary: Get the active onboarding survey
      tags: [Survey]

  /survey/submit:
    post:
      summary: Submit survey answers
      description: |
        Choice answers auto-apply configured roles. Free-text answers route the
        user to pending approval. Returns the resulting approval state.
      tags: [Survey]

  /admin/survey:
    get:
      summary: Get full survey config including role mappings (manage_hub)
      tags: [Survey]
    put:
      summary: Create or replace the survey (manage_hub)
      tags: [Survey]

  /admin/survey/responses:
    get:
      summary: List all survey responses (manage_hub)
      tags: [Survey]

  /admin/survey/responses/{pubkey}:
    get:
      summary: Get a specific user's survey response (manage_hub)
      tags: [Survey]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  # ── Bots (admin) ──────────────────────────────────────────────────────────

  /admin/bots:
    get:
      summary: List all bots on this hub
      tags: [Bots]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/BotAdminInfo' }
    post:
      summary: Create a bot
      description: |
        Any authenticated member may create a bot. Returns the raw bot token
        **once** — store it immediately, it cannot be retrieved again.
      tags: [Bots]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [display_name]
              properties:
                display_name: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BotAdminInfo'
                  - type: object
                    properties:
                      token:
                        type: string
                        description: "Raw bearer token — shown once only"

  /admin/bots/{pubkey}:
    get:
      summary: Get bot detail including registered slash commands
      tags: [Bots]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BotDetail' }
    delete:
      summary: Delete a bot (creator or manage_hub)
      tags: [Bots]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  /admin/bots/{pubkey}/webhook:
    put:
      summary: Set or clear the bot's webhook URL (creator or manage_hub)
      tags: [Bots]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                webhook_url: { type: string, nullable: true }

  # ── Bots (bot API) ────────────────────────────────────────────────────────

  /bot/commands:
    put:
      summary: Register slash commands for this bot
      description: |
        Authenticated with `Authorization: Bearer <bot_token>` (not a user session token).
        Replaces all existing commands for this bot.
      tags: [Bots]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                commands:
                  type: array
                  items:
                    type: object
                    required: [command, description]
                    properties:
                      command: { type: string, description: "Without slash, e.g. 'weather'" }
                      description: { type: string }

  /bot/send:
    post:
      summary: Send a message as this bot
      description: Authenticated with bot token.
      tags: [Bots]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [channel_id, content]
              properties:
                channel_id: { type: string }
                content: { type: string }

  /bot/poll:
    get:
      summary: Poll for undelivered events (slash command invocations)
      description: Authenticated with bot token.
      tags: [Bots]
      parameters:
        - name: since
          in: query
          schema: { type: integer }
          description: Unix timestamp — return events created after this time

  /bot/events:
    delete:
      summary: Acknowledge delivered events
      description: Authenticated with bot token.
      tags: [Bots]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids: { type: array, items: { type: string } }

  # ── Identity / Multi-device ───────────────────────────────────────────────

  /identity/{master}/designation:
    get:
      summary: Get the canonical display-name designation for a master key
      tags: [Identity]
      parameters:
        - name: master
          in: path
          required: true
          schema: { type: string }
    post:
      summary: Set designation
      tags: [Identity]
      parameters:
        - name: master
          in: path
          required: true
          schema: { type: string }

  /identity/{master}/devices:
    get:
      summary: List devices linked to a master key
      tags: [Identity]
      parameters:
        - name: master
          in: path
          required: true
          schema: { type: string }
    post:
      summary: Register a new device subkey
      tags: [Identity]
      parameters:
        - name: master
          in: path
          required: true
          schema: { type: string }

  /identity/{master}/revocations:
    get:
      summary: List revoked device keys
      tags: [Identity]
      parameters:
        - name: master
          in: path
          required: true
          schema: { type: string }
    post:
      summary: Revoke a device key
      tags: [Identity]
      parameters:
        - name: master
          in: path
          required: true
          schema: { type: string }

  /identity/{master}/prefs:
    get:
      summary: Get cross-device preferences blob
      tags: [Identity]
      parameters:
        - name: master
          in: path
          required: true
          schema: { type: string }
    put:
      summary: Store cross-device preferences blob
      tags: [Identity]
      parameters:
        - name: master
          in: path
          required: true
          schema: { type: string }

  /identity/{pubkey}/dh-key:
    get:
      summary: Get DH public key for E2E encryption key exchange
      tags: [Identity]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }
    put:
      summary: Publish own DH public key
      tags: [Identity]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  /identity/pairing/offer:
    post:
      summary: Create a device-pairing offer
      tags: [Identity]

  /identity/pairing/claim:
    post:
      summary: Claim a pairing offer from a new device
      tags: [Identity]

  /identity/pairing/complete:
    post:
      summary: Complete the pairing handshake
      tags: [Identity]

  /identity/pairing/status/{token}:
    get:
      summary: Poll pairing status
      tags: [Identity]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }

  # ── Profile ───────────────────────────────────────────────────────────────

  /profile/{pubkey}:
    get:
      summary: Get public hub-list profile for a user
      security: []
      tags: [Profile]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }
    put:
      summary: Publish own public hub-list profile
      tags: [Profile]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  # ── Federation ────────────────────────────────────────────────────────────

  /federation/peers:
    get:
      summary: List federated peer hubs
      tags: [Federation]
    post:
      summary: Add a federation peer
      tags: [Federation]

  /federation/peers/{peer_key}/channels:
    get:
      summary: List channels shared by a peer hub
      tags: [Federation]
      parameters:
        - name: peer_key
          in: path
          required: true
          schema: { type: string }

  /federation/channels:
    get:
      summary: List all federated channels across all peers
      tags: [Federation]

  /federation/channels/{fed_channel_id}/messages:
    get:
      summary: Fetch messages from a federated channel
      tags: [Federation]
      parameters:
        - name: fed_channel_id
          in: path
          required: true
          schema: { type: string }
    post:
      summary: Post a message to a federated channel
      tags: [Federation]
      parameters:
        - name: fed_channel_id
          in: path
          required: true
          schema: { type: string }

  /federation/dm:
    post:
      summary: Receive a federated DM from a peer hub
      description: Called hub-to-hub, authenticated with the sending hub's Ed25519 key.
      tags: [Federation]

  /federation/alliance-invite:
    post:
      summary: Receive an alliance invite push from a peer hub
      tags: [Federation]

  /admin/directory-sign:
    post:
      summary: Sign a directory entry for the hub discovery service
      tags: [Federation]

  /preview:
    get:
      summary: Fetch a link preview (title/description/image) for a URL
      description: >-
        Server-side fetch with SSRF protection (private/loopback/link-local
        targets rejected, DNS result pinned for the fetch). Responses are
        cached per URL. Rate-limited to 10 requests per 60 seconds per user;
        excess returns 429.
      tags: [Messages]
      parameters:
        - name: url
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }
                  title: { type: string, nullable: true }
                  description: { type: string, nullable: true }
                  image_url: { type: string, nullable: true }
        "429":
          description: Per-user rate limit exceeded

  /admin/search/reindex:
    post:
      summary: Rebuild the full-text search index from the messages table (admin)
      description: >-
        Starts an asynchronous reindex and returns immediately. A second call
        while a reindex is running returns `{"status":"already_running"}`
        instead of starting a duplicate job.
      tags: [Moderation]
      responses:
        "202":
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [started, already_running] }
        "401": { description: Missing/invalid token }
        "403": { description: Caller lacks admin permission }

  # ── Auth (session renewal) ────────────────────────────────────────────────

  /auth/renew:
    post:
      summary: Renew the current session token
      description: |
        Issues a fresh 30-day token while the current one is still live
        (intended for bots renewing long-lived tokens proactively). Requires
        both a valid Bearer token and a fresh challenge-response — same body
        as `POST /auth/verify`; the pubkey must match the authenticated
        identity. The old token is NOT invalidated.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key, challenge, signature]
              properties:
                public_key: { type: string }
                challenge: { type: string }
                signature: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  expires_at: { type: integer, description: "Unix timestamp" }

  # ── Operational ───────────────────────────────────────────────────────────

  /metrics:
    get:
      summary: Prometheus metrics (text exposition format)
      security: []
      tags: [Health]
      responses:
        "200":
          description: "`text/plain` gauges/counters: online users, voice participants, game sessions, video channels, messages total, uptime, DB size."

  /key-rotation:
    get:
      summary: Get the signed hub key-rotation payload
      description: Serves `hub_rotation.json` if the hub has rotated its keypair, so federation peers can follow the rotation. 204 when no rotation exists.
      security: []
      tags: [Federation]
      responses:
        "200":
          description: Signed rotation payload (JSON)
        "204":
          description: No rotation on record

  # ── Admin settings ────────────────────────────────────────────────────────

  /admin/settings/pow:
    get:
      summary: Get the minimum PoW level setting (admin)
      tags: [Hub]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  min_pow_level: { type: integer }
    patch:
      summary: Update the minimum PoW level (admin)
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [min_pow_level]
              properties:
                min_pow_level: { type: integer }

  /admin/settings/channel-depth:
    get:
      summary: Get the maximum channel nesting depth (admin)
      tags: [Hub]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  max_channel_depth: { type: integer }
    patch:
      summary: Update the maximum channel nesting depth (admin)
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [max_channel_depth]
              properties:
                max_channel_depth: { type: integer }

  /admin/settings/moderation:
    patch:
      summary: Set the auto-moderation webhook URL and HMAC secret (admin)
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                webhook_url: { type: string }
                webhook_secret: { type: string }

  /admin/settings/listing:
    patch:
      summary: Toggle whether the hub is listed for discovery (admin)
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [listed]
              properties:
                listed: { type: boolean }

  /admin/settings/tags:
    get:
      summary: Get hub self-tags and NSFW flag (admin)
      tags: [Hub]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags: { type: array, items: { type: string } }
                  nsfw: { type: boolean }
    patch:
      summary: Replace hub self-tags (admin)
      description: >-
        Max 12 tags, each 1–32 chars of `a-z0-9-` after normalisation.
        Reserved words (verified, certified, official, partner, admin) are
        rejected. Returns the normalised tag list.
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [tags]
              properties:
                tags: { type: array, items: { type: string } }
                nsfw: { type: boolean }

  /admin/audit-log:
    get:
      summary: Cursor-paginated hub audit log (admin)
      tags: [Moderation]
      parameters:
        - name: event_type
          in: query
          schema: { type: string }
        - name: since
          in: query
          schema: { type: integer }
          description: Unix timestamp lower bound
        - name: until
          in: query
          schema: { type: integer }
          description: Unix timestamp upper bound
        - name: cursor
          in: query
          schema: { type: integer }
          description: "`next_cursor` from the previous page"
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        seq: { type: integer }
                        event_type: { type: string }
                        at: { type: integer }
                        actor_pubkey: { type: string, nullable: true }
                        target_pubkey: { type: string, nullable: true }
                        channel_id: { type: string, nullable: true }
                        payload: { type: object }
                  next_cursor: { type: integer, nullable: true }

  # ── Unread counts ─────────────────────────────────────────────────────────

  /channels/unread:
    get:
      summary: Unread message counts for every visible channel
      tags: [Channels]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    channel_id: { type: string }
                    unread_count: { type: integer }

  /channels/{channel_id}/read:
    post:
      summary: Mark a channel as read up to now
      tags: [Channels]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }

  # ── Message pins ──────────────────────────────────────────────────────────

  /channels/{channel_id}/pins:
    get:
      summary: List pinned messages in a channel
      tags: [Messages]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    message_id: { type: string }
                    pinned_by: { type: string }
                    pinned_at: { type: integer }
                    message:
                      type: object
                      properties:
                        id: { type: string }
                        content: { type: string }
                        sender: { type: string }
                        sender_name: { type: string, nullable: true }
                        created_at: { type: integer }

  /channels/{channel_id}/pins/{message_id}:
    post:
      summary: Pin a message (manage_messages)
      tags: [Messages]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: message_id
          in: path
          required: true
          schema: { type: string }
    delete:
      summary: Unpin a message (manage_messages)
      tags: [Messages]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: message_id
          in: path
          required: true
          schema: { type: string }

  # ── File uploads ──────────────────────────────────────────────────────────

  /channels/{channel_id}/upload:
    post:
      summary: Upload a file to a channel
      description: >-
        Multipart upload with the file in a `file` field. Max 25 MB
        (512 KB for banner channels, which also only accept PNG/JPEG/GIF/WebP).
        SVG is rejected. Allowed types otherwise: image/*, video/mp4,
        application/pdf, text/plain.
      tags: [Uploads]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  url: { type: string, description: "Path under /uploads/" }
                  filename: { type: string }
                  size_bytes: { type: integer }
                  mime_type: { type: string }
        "413":
          description: File exceeds the size limit
        "415":
          description: Mime type not allowed

  /uploads/{filename}:
    get:
      summary: Download an uploaded file
      description: >-
        Public — filenames are unguessable UUIDs. Always served with
        `Content-Disposition: attachment`.
      security: []
      tags: [Uploads]
      parameters:
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: File bytes
        "404":
          description: File not found

  # ── Content reporting ─────────────────────────────────────────────────────

  /messages/{id}/report:
    post:
      summary: Report a message for moderator review
      tags: [Moderation]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Report recorded
        "429":
          description: Caller already reported this message

  /admin/reports:
    get:
      summary: List message reports (admin)
      tags: [Moderation]
      parameters:
        - name: status
          in: query
          schema: { type: string, default: pending, enum: [pending, reviewed] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    message_id: { type: string }
                    message_content: { type: string, nullable: true }
                    channel_id: { type: string }
                    reporter_pubkey: { type: string }
                    reason: { type: string }
                    reported_at: { type: integer }
                    status: { type: string }

  /admin/reports/{id}/review:
    post:
      summary: Review a report — dismiss, delete the message, or ban the sender (admin)
      tags: [Moderation]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [dismiss, delete_message, ban_user] }
                note: { type: string }

  # ── Search ────────────────────────────────────────────────────────────────

  /search:
    get:
      summary: Full-text search across messages
      description: >-
        Searches the hub message index across all text channels the caller is
        not banned from. Queries shorter than 2 characters return an empty
        array.
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    message_id: { type: string }
                    channel_id: { type: string }
                    channel_name: { type: string }
                    sender: { type: string }
                    sender_name: { type: string, nullable: true }
                    content_preview: { type: string }
                    created_at: { type: integer }

  # ── Custom emojis ─────────────────────────────────────────────────────────

  /emojis:
    get:
      summary: List custom emojis
      security: []
      tags: [Emojis]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    url: { type: string, description: "Path to /emojis/{id}/image" }

  /emojis/{id}/image:
    get:
      summary: Get the emoji image bytes
      security: []
      tags: [Emojis]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Image bytes with the stored mime type, cacheable for 24h

  /admin/emojis:
    post:
      summary: Upload a custom emoji (admin)
      tags: [Emojis]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, mime, data_b64]
              properties:
                name: { type: string }
                mime: { type: string }
                data_b64: { type: string, description: "Base64 image data, max ~90KB encoded" }
      responses:
        "201":
          description: Emoji created

  /admin/emojis/{id}:
    delete:
      summary: Delete a custom emoji (admin)
      tags: [Emojis]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  # ── Events / calendar ─────────────────────────────────────────────────────

  /events:
    get:
      summary: List hub events with RSVP counts
      tags: [Events]
      parameters:
        - name: upcoming
          in: query
          schema: { type: boolean, default: false }
          description: Only events starting now or later
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    channel_id: { type: string }
                    creator_pubkey: { type: string }
                    title: { type: string }
                    description: { type: string }
                    starts_at: { type: integer }
                    ends_at: { type: integer, nullable: true }
                    location: { type: string, nullable: true }
                    created_at: { type: integer }
                    rsvp_counts:
                      type: object
                      properties:
                        going: { type: integer }
                        maybe: { type: integer }
                        not_going: { type: integer }
    post:
      summary: Create an event (create_events)
      description: Also posts a system card message into the target channel.
      tags: [Events]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [channel_id, title, starts_at]
              properties:
                channel_id: { type: string }
                title: { type: string }
                description: { type: string }
                starts_at: { type: integer, description: "Unix timestamp" }
                ends_at: { type: integer }
                location: { type: string }

  /events/{event_id}:
    get:
      summary: Get an event with RSVP counts
      tags: [Events]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string }
    put:
      summary: Update an event (creator or admin)
      tags: [Events]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                starts_at: { type: integer }
                ends_at: { type: integer }
                location: { type: string }
    delete:
      summary: Delete an event (creator or admin)
      tags: [Events]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string }

  /events/{event_id}/rsvp:
    post:
      summary: RSVP to an event (upserts the caller's status)
      tags: [Events]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [going, maybe, not_going] }

  /events/{event_id}/rsvps:
    get:
      summary: List individual RSVPs for an event
      tags: [Events]
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    user_pubkey: { type: string }
                    status: { type: string }

  # ── Polls ─────────────────────────────────────────────────────────────────

  /channels/{channel_id}/polls:
    post:
      summary: Create a poll in a channel (send_messages)
      description: Also posts a system card message into the channel. At least 2 options required.
      tags: [Polls]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [question, options]
              properties:
                question: { type: string }
                options:
                  type: array
                  items:
                    type: object
                    required: [id, text]
                    properties:
                      id: { type: string }
                      text: { type: string }
                ends_at: { type: integer, nullable: true }
                max_choices: { type: integer, default: 1 }

  /polls/{poll_id}:
    get:
      summary: Get a poll with vote totals and the caller's vote
      tags: [Polls]
      parameters:
        - name: poll_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  channel_id: { type: string }
                  creator_pubkey: { type: string }
                  question: { type: string }
                  options: { type: string, description: "JSON-encoded array of {id, text}" }
                  ends_at: { type: integer, nullable: true }
                  max_choices: { type: integer }
                  created_at: { type: integer }
                  totals:
                    type: object
                    additionalProperties: { type: integer }
                    description: option_id → vote count
                  your_vote:
                    type: array
                    items: { type: string }
                    nullable: true
    delete:
      summary: Delete a poll (creator or admin)
      tags: [Polls]
      parameters:
        - name: poll_id
          in: path
          required: true
          schema: { type: string }

  /polls/{poll_id}/vote:
    post:
      summary: Cast or replace the caller's vote
      tags: [Polls]
      parameters:
        - name: poll_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [option_ids]
              properties:
                option_ids:
                  type: array
                  items: { type: string }
                  description: Must not exceed the poll's max_choices
      responses:
        "204":
          description: Vote recorded; updated totals broadcast over WS
        "410":
          description: Poll has ended

  # ── Forum ─────────────────────────────────────────────────────────────────

  /channels/{channel_id}/posts:
    get:
      summary: List posts in a forum channel (pinned first, then by activity)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
          description: Opaque cursor from the previous page
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items: { $ref: '#/components/schemas/PostSummary' }
                  cursor: { type: string, description: "Omitted on the last page" }
    post:
      summary: Create a post (create_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title, body]
              properties:
                title: { type: string }
                body: { type: string }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PostDetail' }

  /channels/{channel_id}/posts/search:
    get:
      summary: Full-text search within a forum channel
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        post_id: { type: string }
                        title_snippet: { type: string }
                        body_snippet: { type: string }
                        is_reply: { type: boolean }
                        reply_id: { type: string }
                  cursor: { type: string }

  /channels/{channel_id}/posts/{post_id}:
    get:
      summary: Get a post with a page of replies
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }
        - name: after
          in: query
          schema: { type: string }
          description: Reply ID cursor — return replies created after it
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PostDetail' }
    patch:
      summary: Edit a post's title and/or body (author or manage_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                body: { type: string }
    delete:
      summary: Delete a post — soft delete / tombstone (author or manage_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/posts/{post_id}/replies:
    post:
      summary: Reply to a post (send_messages; locked posts require manage_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
                reply_to_id: { type: string, description: "Optional parent reply within the same post" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReplyView' }

  /channels/{channel_id}/posts/{post_id}/replies/{reply_id}:
    patch:
      summary: Edit a reply (author or manage_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }
        - name: reply_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
    delete:
      summary: Delete a reply — soft delete (author or manage_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }
        - name: reply_id
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/posts/{post_id}/pin:
    post:
      summary: Pin a post (manage_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }
    delete:
      summary: Unpin a post (manage_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/posts/{post_id}/lock:
    post:
      summary: Lock a post against new replies (manage_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }
    delete:
      summary: Unlock a post (manage_posts)
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/posts/{post_id}/read:
    post:
      summary: Mark a post's replies as read up to now
      tags: [Forum]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: post_id
          in: path
          required: true
          schema: { type: string }

  # ── Channel-scoped moderation (pubkey field) ──────────────────────────────

  /channels/{channel_id}/bans:
    get:
      summary: List channel bans (ban_members)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    channel_id: { type: string }
                    pubkey: { type: string }
                    banned_by: { type: string }
                    banned_at: { type: string }
    post:
      summary: Ban a user from a channel (ban_members)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [pubkey]
              properties:
                pubkey: { type: string }

  /channels/{channel_id}/bans/{pubkey}:
    delete:
      summary: Remove a channel ban (ban_members)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/voice-mutes:
    get:
      summary: List per-channel voice mutes (mute_members)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    channel_id: { type: string }
                    pubkey: { type: string }
                    muted_by: { type: string }
                    muted_at: { type: string }
    post:
      summary: Voice-mute a user in a channel (mute_members)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [pubkey]
              properties:
                pubkey: { type: string }

  /channels/{channel_id}/voice-mutes/{pubkey}:
    delete:
      summary: Remove a per-channel voice mute (mute_members)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/raise-hand:
    post:
      summary: Raise hand to request talk permission
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  channel_id: { type: string }
                  pubkey: { type: string }
                  requested_at: { type: string }

  /channels/{channel_id}/raise-hand/{pubkey}:
    delete:
      summary: Lower a hand (own hand, or anyone's with mute_members)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  /channels/{channel_id}/raise-hands:
    get:
      summary: List raised hands in a channel (oldest first)
      tags: [Moderation]
      parameters:
        - name: channel_id
          in: path
          required: true
          schema: { type: string }

  # ── Badges (hub-to-hub attestations) ──────────────────────────────────────

  /badges:
    get:
      summary: List badges this hub holds (admin)
      tags: [Badges]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    issuer_pubkey: { type: string }
                    issuer_url: { type: string }
                    label: { type: string }
                    payload: { $ref: '#/components/schemas/BadgePayload' }
                    accepted_at: { type: string }

  /badges/{id}:
    delete:
      summary: Delete a held badge (admin)
      tags: [Badges]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /badges/pending:
    get:
      summary: List pending badge offers from other hubs (admin)
      tags: [Badges]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    from_hub_pubkey: { type: string }
                    from_hub_url: { type: string }
                    label: { type: string }
                    note: { type: string, nullable: true }
                    payload: { $ref: '#/components/schemas/BadgePayload' }
                    created_at: { type: string }

  /badges/pending/{id}/accept:
    post:
      summary: Accept a pending badge offer after signature re-verification (admin)
      tags: [Badges]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /badges/pending/{id}/decline:
    post:
      summary: Decline and delete a pending badge offer (admin)
      tags: [Badges]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /admin/badges/issue:
    post:
      summary: Issue a badge to another hub (admin)
      description: >-
        Fetches the recipient hub's /info, signs the badge payload with this
        hub's keypair, delivers it to the recipient's
        /federation/badge-offer, and records it locally.
      tags: [Badges]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [recipient_hub_url, label]
              properties:
                recipient_hub_url: { type: string }
                label: { type: string }
                note: { type: string }
                expires_days: { type: integer }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  recipient_hub_url: { type: string }
                  recipient_hub_pubkey: { type: string }
                  label: { type: string }
                  payload: { $ref: '#/components/schemas/BadgePayload' }
                  issued_at: { type: string }
                  expires_at: { type: string, nullable: true }
        "502":
          description: Recipient hub unreachable

  /admin/badges/issued:
    get:
      summary: List badges this hub has issued (admin)
      tags: [Badges]

  /admin/badges/issued/{id}/revoke:
    delete:
      summary: Revoke an issued badge (admin)
      description: Sets `revoked_at`; the revocation appears in /federation/badge-revocations.
      tags: [Badges]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /federation/badge-offer:
    post:
      summary: Receive a badge offer from another hub
      description: Hub-to-hub. The Ed25519 signature over the payload is the credential; no Bearer token.
      security: []
      tags: [Badges]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [from_hub_pubkey, from_hub_url, label, payload, signature]
              properties:
                from_hub_pubkey: { type: string }
                from_hub_url: { type: string }
                label: { type: string }
                note: { type: string, nullable: true }
                payload: { type: string, description: "Canonical BadgePayload JSON string" }
                signature: { type: string, description: "Hex Ed25519 signature over payload bytes" }

  /federation/badge-revocations:
    get:
      summary: List badges this hub has revoked (public, polled by other hubs)
      security: []
      tags: [Badges]
      parameters:
        - name: since
          in: query
          schema: { type: string }
          description: ISO-8601 timestamp — only revocations at or after this time
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    recipient_hub_pubkey: { type: string }
                    label: { type: string }
                    revoked_at: { type: string }

  # ── Certifications ────────────────────────────────────────────────────────

  /admin/certs:
    get:
      summary: List all cert issuances (admin)
      tags: [Certifications]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    subject_pubkey: { type: string }
                    pow_level: { type: integer, nullable: true }
                    member_since: { type: integer }
                    issued_at: { type: integer }
                    expires_at: { type: integer }
                    revoked_at: { type: integer, nullable: true }
                    standing: { type: string, enum: [good, revoked] }
                    payload: { $ref: '#/components/schemas/CertPayload' }

  /admin/certs/{pubkey}:
    post:
      summary: Manually issue a cert for a user (admin)
      tags: [Certifications]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Certification' }
        "403":
          description: User not approved or banned

  /admin/certs/{pubkey}/revoke:
    post:
      summary: Revoke a user's certs (admin)
      description: Marks existing certs revoked and re-issues a short-lived standing=revoked cert so pull-path verifiers see it.
      tags: [Certifications]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  /admin/settings/certs:
    get:
      summary: Get certification settings (admin)
      tags: [Certifications]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  cert_mode: { type: string, enum: [none, any, trusted] }
                  cert_auto_issue: { type: boolean }
                  cert_min_age_days: { type: integer }
                  cert_validity_days: { type: integer }
                  cert_trusted_issuers: { type: array, items: { type: string } }
    patch:
      summary: Update certification settings (admin)
      description: All fields optional; string-typed values are stored as hub settings.
      tags: [Certifications]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cert_auto_issue: { type: string }
                cert_standing_days: { type: string }
                cert_validity_days: { type: string }
                cert_mode: { type: string, enum: [none, any, trusted] }
                cert_trusted_issuers:
                  type: array
                  items:
                    type: object
                    properties:
                      pubkey: { type: string }
                      url: { type: string }
                      label: { type: string }
                cert_require:
                  type: object
                  properties:
                    min_pow_level: { type: integer }
                    min_member_since_days: { type: integer }
                cert_min_pow_level: { type: string }

  /identity/{pubkey}/certs:
    get:
      summary: List valid certs for a user (public)
      description: >-
        Returns non-revoked, non-expired certs this hub issued for the user
        plus cross-hub certs deposited into the user's portfolio. Used by
        receiving hubs to pull certs directly from the issuer.
      security: []
      tags: [Certifications]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Certification' }

  /certs/revocations:
    get:
      summary: List cert revocations (public, polled by other hubs)
      security: []
      tags: [Certifications]
      parameters:
        - name: since
          in: query
          schema: { type: integer }
          description: Unix timestamp — only revocations at or after this time
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    subject_pubkey: { type: string }
                    revoked_at: { type: integer }

  # ── Recovery contacts / key rotation ──────────────────────────────────────

  /recovery/contacts:
    get:
      summary: Get the caller's recovery contacts and threshold
      tags: [Recovery]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  owner_pubkey: { type: string }
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        pubkey: { type: string }
                        added_at: { type: integer }
                  threshold: { type: integer }
    put:
      summary: Replace the caller's recovery contact list
      description: Max 5 contacts; threshold must be between 1 and the contact count; the caller cannot be their own contact.
      tags: [Recovery]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [contacts, threshold]
              properties:
                contacts: { type: array, items: { type: string } }
                threshold: { type: integer }

  /recovery/contacts/{pubkey}:
    delete:
      summary: Remove one recovery contact
      tags: [Recovery]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  /recovery/rotate-key:
    post:
      summary: Open a key-rotation request with inline attestations
      description: >-
        Called by the NEW key — no Bearer token required. Attestations from
        configured recovery contacts are validated; once the count reaches the
        owner's threshold the request flips to `ready_for_review` for admin
        action.
      security: []
      tags: [Recovery]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [old_pubkey, new_pubkey, attestations]
              properties:
                old_pubkey: { type: string }
                new_pubkey: { type: string }
                reason: { type: string }
                attestations:
                  type: array
                  items:
                    type: object
                    required: [attester, signature]
                    properties:
                      attester: { type: string }
                      signature: { type: string }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  old_pubkey: { type: string }
                  new_pubkey: { type: string }
                  status: { type: string, enum: [pending, ready_for_review] }
                  created_at: { type: integer }
                  attestation_count: { type: integer }

  /recovery/requests:
    get:
      summary: List the caller's own rotation requests
      tags: [Recovery]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    new_pubkey: { type: string }
                    status: { type: string }
                    created_at: { type: integer }
                    attestation_count: { type: integer }
                    threshold: { type: integer }

  /admin/recovery/pending:
    get:
      summary: List rotation requests awaiting admin review (admin)
      tags: [Recovery]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    old_pubkey: { type: string }
                    new_pubkey: { type: string }
                    reason: { type: string, nullable: true }
                    status: { type: string }
                    created_at: { type: integer }
                    attestation_count: { type: integer }

  /admin/recovery/{id}/approve:
    post:
      summary: Approve a rotation request (admin)
      description: Transfers roles to the new key and revokes all sessions for the old key; the user re-authenticates with the new key.
      tags: [Recovery]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /admin/recovery/{id}/deny:
    post:
      summary: Deny a rotation request (admin)
      tags: [Recovery]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  # ── Incoming webhooks ─────────────────────────────────────────────────────

  /admin/webhooks:
    post:
      summary: Create an incoming webhook for a channel (admin)
      description: The returned `webhook_url` embeds the secret token and is shown **once** — only its hash is stored.
      tags: [Webhooks]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [channel_id, display_name]
              properties:
                channel_id: { type: string }
                display_name: { type: string }
                avatar_url: { type: string }
                rate_limit: { type: integer, default: 5 }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  webhook_url: { type: string, description: "Full URL including the secret token" }
                  display_name: { type: string }

  /admin/webhooks/{id}:
    delete:
      summary: Deactivate a webhook (admin)
      tags: [Webhooks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /webhooks/{id}/{token}:
    post:
      summary: Post a message via an incoming webhook
      description: No Authorization header — the token in the URL is the credential (compared in constant time against the stored hash).
      security: []
      tags: [Webhooks]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: token
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
                username: { type: string, description: "Overrides the webhook's display name" }
                avatar_url: { type: string }
                embeds: { type: object }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, description: "Created message ID" }
        "401":
          description: Invalid webhook token

  # ── Bots (external bot system) ────────────────────────────────────────────

  /bots:
    get:
      summary: List external bots on this hub (any member)
      tags: [Bots]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    pubkey: { type: string }
                    name: { type: string }
                    avatar_url: { type: string }
                    description: { type: string }
                    last_seen_at: { type: integer }
                    webhook_url: { type: string }
                    commands:
                      type: array
                      items:
                        type: object
                        properties:
                          name: { type: string }
                          description: { type: string }
    post:
      summary: Invite an external bot by pubkey (manage_roles or admin)
      tags: [Bots]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [pubkey]
              properties:
                pubkey: { type: string, description: "64-hex-char Ed25519 public key" }
                note: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite_token: { type: string }

  /bots/{pubkey}:
    delete:
      summary: Remove an external bot (admin)
      tags: [Bots]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  /bots/accept-invite:
    post:
      summary: Bot accepts an invite by signing the invite token
      security: []
      tags: [Bots]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [pubkey, signature_over_token, bot_meta]
              properties:
                pubkey: { type: string }
                signature_over_token: { type: string, description: "Hex Ed25519 signature over the invite token" }
                bot_meta:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    avatar_url: { type: string }
                    webhook_url: { type: string }
                    description: { type: string }
                    homepage_url: { type: string }
                    commands: { type: array, items: { type: object } }
                    capabilities: { type: array, items: { type: string } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: accepted }
        "410":
          description: Invite token has expired

  /bots/me:
    get:
      summary: Bot fetches its own profile and commands (bot identity only)
      tags: [Bots]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  pubkey: { type: string }
                  name: { type: string }
                  avatar_url: { type: string }
                  description: { type: string }
                  webhook_url: { type: string }
                  homepage_url: { type: string }
                  capabilities: { type: array, items: { type: string } }
                  commands: { type: array, items: { type: object } }
        "403":
          description: Caller is not a bot identity

  /bots/me/profile:
    put:
      summary: Bot replaces its own profile (bot identity only)
      tags: [Bots]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                avatar_url: { type: string }
                webhook_url: { type: string }
                description: { type: string }
                homepage_url: { type: string }
                capabilities: { type: array, items: { type: string } }

  /bots/me/commands:
    put:
      summary: Bot replaces its slash-command list (bot identity only)
      tags: [Bots]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [commands]
              properties:
                commands:
                  type: array
                  items:
                    type: object
                    required: [name, description]
                    properties:
                      name: { type: string }
                      description: { type: string }
                      args: { type: string }
                      scope: { type: string }
                      privileged: { type: boolean }
                      cooldown_seconds: { type: integer }

  /bots/me/subscriptions:
    put:
      summary: Bot replaces its event subscriptions (bot identity only)
      tags: [Bots]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [subscriptions]
              properties:
                subscriptions:
                  type: array
                  items:
                    type: object
                    properties:
                      event: { type: string }
                      channel_id: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /bots/{id}/voice/join:
    post:
      summary: Bot joins a voice channel
      description: >
        Tells the hub which voice channel the bot wants to join. Returns the
        `/voice/ws` path the bot should connect to using its bearer token and
        `channel_id` as query parameters. The bot then streams Opus frames in
        the same binary format as desktop/Android clients.
      tags: [Bots]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: Bot public key — must match the authenticated bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel_id]
              properties:
                channel_id: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  voice_ws_url: { type: string, example: /voice/ws }
                  channel_id: { type: string }
        "403": { description: Caller is not the bot identified by {id} }
        "404": { description: Channel not found }

  /bots/{id}/voice/leave:
    delete:
      summary: Bot leaves a voice channel
      description: >
        Runs the same cleanup as a normal WebSocket voice disconnect.
        Idempotent — calling when not in the channel is a no-op.
      tags: [Bots]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel_id]
              properties:
                channel_id: { type: string }
      responses:
        "204": { description: No content }
        "403": { description: Caller is not the bot identified by {id} }

  /bots/{id}/screenshare/start:
    post:
      summary: Bot registers a video stream in a channel
      description: >
        Registers a new screen-share stream for the bot and broadcasts
        `screen_share_started` to all channel subscribers. After this call
        the bot pushes `screen_share_chunk` binary envelopes over its WS
        connection using the returned `stream_id`.
      tags: [Bots]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel_id]
              properties:
                channel_id: { type: string }
                kind: { type: string, default: screen, description: "e.g. screen, webcam, video" }
                mime: { type: string, default: video/webm }
                has_audio: { type: boolean, default: false }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  stream_id: { type: string }
                  channel_id: { type: string }
        "403": { description: Caller is not the bot identified by {id} }
        "404": { description: Channel not found }

  /bots/{id}/screenshare/stop:
    delete:
      summary: Bot stops a previously started video stream
      description: >
        Deregisters the stream and broadcasts `screen_share_stopped` to all
        channel subscribers. Notifies any cross-channel subscribers that their
        subscription ended. Idempotent — safe to call if the stream is already
        gone.
      tags: [Bots]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel_id, stream_id]
              properties:
                channel_id: { type: string }
                stream_id: { type: string }
      responses:
        "204": { description: No content — idempotent if stream already gone }
        "403": { description: Caller is not the bot identified by {id} }

  # ── Group DM membership / sender keys ─────────────────────────────────────

  /conversations/{conversation_id}/members:
    post:
      summary: Add a member to a group conversation (members only; not 1-on-1 DMs)
      tags: [DMs]
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [public_key]
              properties:
                public_key: { type: string }

  /conversations/{conversation_id}/members/{pubkey}:
    delete:
      summary: Leave a group conversation (callers may only remove themselves)
      tags: [DMs]
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
        - name: pubkey
          in: path
          required: true
          schema: { type: string }

  /conversations/{conversation_id}/sender-keys:
    get:
      summary: Fetch wrapped group sender keys addressed to the caller
      tags: [DMs]
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    sender_pubkey: { type: string }
                    sender_key_version: { type: integer }
                    iteration: { type: integer }
                    wrapped_key_hex: { type: string }
                    wrap_nonce_hex: { type: string }
                    created_at: { type: integer }
    put:
      summary: Distribute the caller's group sender key (group conversations only)
      tags: [DMs]
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sender_key_version, recipients, signature_hex]
              properties:
                sender_key_version: { type: integer }
                recipients:
                  type: array
                  items:
                    type: object
                    required: [recipient_pubkey, wrapped_key_hex, wrap_nonce_hex, iteration]
                    properties:
                      recipient_pubkey: { type: string }
                      wrapped_key_hex: { type: string }
                      wrap_nonce_hex: { type: string }
                      iteration: { type: integer }
                signature_hex: { type: string, description: "Ed25519 signature over canonical bytes" }

  # ── DM block set ──────────────────────────────────────────────────────────

  /identity/dm-blocks:
    get:
      summary: Get the caller's DM-block set
      tags: [Identity]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  pubkeys: { type: array, items: { type: string } }
    put:
      summary: Replace the caller's DM-block set
      tags: [Identity]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [pubkeys]
              properties:
                pubkeys: { type: array, items: { type: string } }

  # ── Alliances (hub-to-hub join + push invite) ─────────────────────────────

  /alliances/{alliance_id}/join:
    post:
      summary: Remote hub joins an alliance with an invite token
      description: Hub-to-hub. The invite token (this hub's signature over the alliance id) is the credential; no Bearer token.
      security: []
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [invite_token, hub_url]
              properties:
                invite_token: { type: string }
                hub_url: { type: string }

  /alliances/{alliance_id}/push-invite:
    post:
      summary: Push a direct alliance invite to another hub (admin)
      tags: [Alliances]
      parameters:
        - name: alliance_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [target_hub_url, own_hub_url]
              properties:
                target_hub_url: { type: string }
                own_hub_url: { type: string }
                message: { type: string, nullable: true }

  # ── Join links ────────────────────────────────────────────────────────────

  /join/{code}:
    get:
      summary: Preview an invite (public)
      security: []
      tags: [Invites]
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  hub_name: { type: string }
                  member_count: { type: integer }
                  code: { type: string }
        "404":
          description: Invite not found
        "410":
          description: Invite expired or fully used
    post:
      summary: Redeem an invite (requires session token)
      description: Increments the invite's use count and auto-approves the caller, bypassing the approval queue.
      tags: [Invites]
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Joined
        "410":
          description: Invite expired or fully used

  # ── User profiles ─────────────────────────────────────────────────────────

  /users/{pubkey}/profile:
    get:
      summary: Get a user's hub profile (roles + badges)
      tags: [Users]
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  public_key: { type: string }
                  display_name: { type: string, nullable: true }
                  avatar: { type: string, nullable: true }
                  joined_at: { type: integer }
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        color: { type: string, nullable: true }
                  badges:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        label: { type: string }

  # ── Federation (discovery + ban list) ─────────────────────────────────────

  /federation/listing:
    get:
      summary: Hub discovery metadata (public)
      description: Always returns 200 with all fields, even when `listed` is false, so clients can probe any hub URL.
      security: []
      tags: [Federation]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  name: { type: string }
                  description: { type: string, nullable: true }
                  public_key: { type: string }
                  hub_url: { type: string }
                  tags: { type: array, items: { type: string } }
                  member_count_approx: { type: integer, description: "Rounded down to the nearest 10" }
                  listed: { type: boolean }

  /federation/banlist:
    get:
      summary: Signed export of this hub's ban list (public)
      description: Subscribing hubs poll this feed; the Ed25519 signature is the authority.
      security: []
      tags: [Federation]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  payload:
                    type: object
                    properties:
                      issuer_pubkey: { type: string }
                      issued_at: { type: integer }
                      entries:
                        type: array
                        items:
                          type: object
                          properties:
                            master_pubkey: { type: string }
                            reason: { type: string, nullable: true }
                            added_at: { type: integer }
                  signature: { type: string }

